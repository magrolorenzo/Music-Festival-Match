openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: places
    description: Geocoding / location autocomplete
  - name: events
    description: Live event search
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /places:
    get:
      operationId: searchPlaces
      tags: [places]
      summary: Location autocomplete
      description: >
        Geo-normalizes a free-text query into structured place suggestions with
        exact coordinates via OpenStreetMap Nominatim (server-side, rate-limited).
      parameters:
        - name: q
          in: query
          required: true
          description: Free-text place query, e.g. "Verona" or "Berlin, Germany".
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Up to five matching places, best-first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Place"
  /search:
    post:
      operationId: searchEvents
      tags: [events]
      summary: Search live events
      description: >
        Runs the full live pipeline server-side: JamBase v3 events in the geo +
        date window, genre filtered server-side via genreSlug, then per-performer
        enrichment (Musixmatch track search + lyrics analysis) with DB-cached TTL.
        Returns an empty list when the live pipeline is unavailable.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchInput"
      responses:
        "200":
          description: Enriched events in the geo + date window.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    GenreKey:
      type: string
      enum:
        - bluegrass
        - blues
        - christian
        - classical
        - country-music
        - edm
        - folk
        - hip-hop-rap
        - indie
        - jamband
        - jazz
        - kpop
        - latin
        - metal
        - pop
        - punk
        - rhythm-and-blues-soul
        - reggae
        - rock
        - tribute
    MoodKey:
      type: string
      enum:
        - love
        - heartbreak
        - joy
        - empowerment
        - angst
        - reflection
        - inspiration
        - nostalgia
        - despair
        - celebration
        - anger
        - peace
        - solitude
        - adventure
        - social-commentary
        - hope
        - spirituality
        - freedom
        - party
        - nature
    RegionKey:
      type: string
      enum: [europe, north-america]
    EventKind:
      type: string
      enum: [festival, concert]
    Place:
      type: object
      required: [query, label, latitude, longitude]
      properties:
        query:
          type: string
          description: The raw text the user typed.
        label:
          type: string
          description: Clean human-readable place name from the geocoder.
        latitude:
          type: number
        longitude:
          type: number
    JamBaseLocation:
      type: object
      required: [name, city, country, latitude, longitude]
      properties:
        name:
          type: string
        city:
          type: string
        country:
          type: string
        latitude:
          type: number
        longitude:
          type: number
    CyaniteAnalysis:
      type: object
      required: [musicGenres, genreKeys, audioValence, audioEnergy, moodKeys]
      properties:
        musicGenres:
          type: array
          items:
            type: string
        genreKeys:
          type: array
          items:
            $ref: "#/components/schemas/GenreKey"
        audioValence:
          type: number
        audioEnergy:
          type: number
        moodKeys:
          type: array
          items:
            $ref: "#/components/schemas/MoodKey"
    Track:
      type: object
      required: [trackId, trackName, trackRating, spotifyId, albumName]
      properties:
        trackId:
          type: integer
          description: Musixmatch track ID.
        trackName:
          type: string
        trackRating:
          type: integer
          description: Musixmatch popularity rating for this track.
        spotifyId:
          type: ["string", "null"]
          description: Spotify track ID (for future playback integration).
        albumName:
          type: string
    MusixmatchQuote:
      type: object
      required: [trackName, moods, quote]
      properties:
        trackName:
          type: string
        moods:
          type: array
          items:
            $ref: "#/components/schemas/MoodKey"
          description: Mood keys derived from lyrics analysis for this track.
        quote:
          type: string
          description: First available theme quote from lyrics analysis.
    Performer:
      type: object
      required:
        [id, name, image, isHeadliner, cyanite, tracks, quotes]
      properties:
        id:
          type: string
        name:
          type: string
        image:
          type: ["string", "null"]
        isHeadliner:
          type: boolean
        cyanite:
          $ref: "#/components/schemas/CyaniteAnalysis"
        tracks:
          type: array
          description: Top tracks from Musixmatch (up to 3).
          items:
            $ref: "#/components/schemas/Track"
        quotes:
          type: array
          description: One quote per track that has lyrics (from analysis).
          items:
            $ref: "#/components/schemas/MusixmatchQuote"
    LiveEvent:
      type: object
      required:
        - id
        - kind
        - name
        - description
        - startDate
        - endDate
        - image
        - region
        - location
        - geoRadiusKm
        - performers
        - otherPerformerNames
        - genreKeys
        - moodKeys
        - ticketUrl
      properties:
        id:
          type: string
        kind:
          $ref: "#/components/schemas/EventKind"
        name:
          type: string
        description:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        image:
          type: ["string", "null"]
        region:
          $ref: "#/components/schemas/RegionKey"
        location:
          $ref: "#/components/schemas/JamBaseLocation"
        geoRadiusKm:
          type: number
        performers:
          type: array
          items:
            $ref: "#/components/schemas/Performer"
        otherPerformerNames:
          type: array
          description: >-
            Names of additional lineup performers beyond the enriched
            `performers`, shown as a plain list.
          items:
            type: string
        genreKeys:
          type: array
          items:
            $ref: "#/components/schemas/GenreKey"
        moodKeys:
          type: array
          items:
            $ref: "#/components/schemas/MoodKey"
        ticketUrl:
          type: [ "string", "null" ]
          description: URL to purchase tickets for this event.
    SearchInput:
      type: object
      required: [latitude, longitude, radiusKm, startDate, endDate, genres]
      properties:
        latitude:
          type: number
        longitude:
          type: number
        radiusKm:
          type: number
          minimum: 1
        startDate:
          type: string
          description: Inclusive ISO date (YYYY-MM-DD).
        endDate:
          type: string
          description: Inclusive ISO date (YYYY-MM-DD).
        genres:
          type: array
          description: Selected genre keys; an empty list means "any genre".
          items:
            $ref: "#/components/schemas/GenreKey"
    SearchResults:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/LiveEvent"
